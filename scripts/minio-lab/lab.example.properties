# 破坏性实验环境示例配置。
#
# 复制为 scripts/minio-lab/lab.properties 或放到任意路径后设置：
#   export MINIO_LAB_CONFIG_FILE=/path/to/lab.properties
#
# 不要把真实端点、access key、secret key 提交到仓库。

MINIO_ALLOW_DESTRUCTIVE_ADMIN_TESTS=true
MINIO_LAB_ENDPOINT=http://独立-lab:9000
MINIO_LAB_ACCESS_KEY=your-lab-access-key
MINIO_LAB_SECRET_KEY=your-lab-secret-key
MINIO_LAB_REGION=us-east-1
MINIO_LAB_CAN_RESTORE=true

# config write + restore：只有同时设置下面两项才会执行真实配置写入。
MINIO_LAB_TEST_CONFIG_KV=api requests_max=10
MINIO_LAB_RESTORE_CONFIG_KV=api requests_max=0

# full config 原样写回：只允许独立 lab，默认关闭；开启后测试会读取加密全量配置、解密后原样写回，再恢复原始文本。
MINIO_LAB_ALLOW_FULL_CONFIG_WRITE=false

# bucket quota 可回滚实验：bucket 必须属于独立 lab。
MINIO_LAB_BUCKET=lab-bucket
MINIO_LAB_TEST_BUCKET_QUOTA_JSON={"quota":1048576,"quotatype":"hard"}
MINIO_LAB_RESTORE_BUCKET_QUOTA_JSON={"quota":0,"quotatype":"hard"}

# tier / remote target / batch job 探测：不设置时自动跳过。
MINIO_LAB_TIER_NAME=
MINIO_LAB_EXPECT_TIER_IN_LIST=false
MINIO_LAB_REMOTE_TARGET_TYPE=replication
MINIO_LAB_REMOTE_TARGET_EXPECTED_ARN=
# replication diff 探测需要 bucket 已配置复制规则；默认关闭，避免把无复制配置的普通 lab 当作通过证据。
MINIO_LAB_ENABLE_REPLICATION_DIFF_PROBE=false
MINIO_LAB_REPLICATION_DIFF_PREFIX=
MINIO_LAB_REPLICATION_DIFF_ARN=
MINIO_LAB_ENABLE_BATCH_JOB_PROBES=false
MINIO_LAB_BATCH_EXPECTED_JOB_ID=

# 真实写入夹具总开关：只有独立 lab 且确认能回滚时才允许打开。
MINIO_LAB_ALLOW_WRITE_FIXTURES=false

# tier add/edit/remove 可回滚写入夹具：必须使用仅属于本次 lab 的 tier 名称。
# 请求体模板见 templates/tier-add-minio.json.example 和 templates/tier-edit-creds.json.example；填写后的文件应放在仓库外。
MINIO_LAB_TIER_WRITE_NAME=REACTIVE-LAB-TIER
MINIO_LAB_TIER_WRITE_CONTENT_TYPE=application/json
MINIO_LAB_ADD_TIER_BODY=
MINIO_LAB_ADD_TIER_BODY_FILE=
MINIO_LAB_EDIT_TIER_BODY=
MINIO_LAB_EDIT_TIER_BODY_FILE=
MINIO_LAB_REMOVE_TIER_AFTER_TEST=true

# remote target set/remove 可回滚写入夹具：bucket 必须属于独立 lab；删除 ARN 优先从 set 响应解析，必要时再手工填写。
# 请求体模板见 templates/remote-target-set-replication.json.example；填写后的文件应放在仓库外。
MINIO_LAB_REMOTE_TARGET_WRITE_BUCKET=lab-bucket
MINIO_LAB_REMOTE_TARGET_WRITE_CONTENT_TYPE=application/json
MINIO_LAB_SET_REMOTE_TARGET_BODY=
MINIO_LAB_SET_REMOTE_TARGET_BODY_FILE=
MINIO_LAB_REMOVE_REMOTE_TARGET_ARN=
MINIO_LAB_REMOVE_REMOTE_TARGET_AFTER_TEST=true

# batch job start/status/cancel 实验矩阵：建议使用 BODY_FILE 引用本机私有 YAML；取消使用 start 响应 jobId，不再要求 cancel 请求体。
MINIO_LAB_BATCH_JOB_CONTENT_TYPE=application/yaml
MINIO_LAB_BATCH_START_BODY=
MINIO_LAB_BATCH_START_BODY_FILE=
# 旧式兼容字段：当前 SDK 不再要求；只有手工复现实验时才需要。
MINIO_LAB_BATCH_CANCEL_BODY=
MINIO_LAB_BATCH_CANCEL_BODY_FILE=
MINIO_LAB_CANCEL_BATCH_AFTER_TEST=true

# site replication add/edit/remove 实验矩阵：建议使用 BODY_FILE 引用本机私有 JSON，模板见 templates/site-replication-*.json.example。
MINIO_LAB_SITE_REPLICATION_CONTENT_TYPE=application/json
MINIO_LAB_SITE_REPLICATION_ADD_BODY=
MINIO_LAB_SITE_REPLICATION_ADD_BODY_FILE=
MINIO_LAB_SITE_REPLICATION_EDIT_BODY=
MINIO_LAB_SITE_REPLICATION_EDIT_BODY_FILE=
MINIO_LAB_SITE_REPLICATION_REMOVE_BODY=
MINIO_LAB_SITE_REPLICATION_REMOVE_BODY_FILE=
MINIO_LAB_REMOVE_SITE_REPLICATION_AFTER_TEST=true

# 可选：覆盖 破坏性实验环境执行报告目录；默认写入 target/minio-lab-reports。
MINIO_LAB_REPORT_DIR=

# 可选：报告里用于提示 mc 恢复/核验命令的本机私有 alias 名称。
# alias 本身必须通过本机 `mc alias set` 配置，不能把凭证写入仓库。
MINIO_LAB_MC_ALIAS=

# 可选：覆盖 typed/raw 步骤状态文件；通常由 run-destructive-tests.sh 自动生成。
MINIO_LAB_STEP_STATUS_FILE=
